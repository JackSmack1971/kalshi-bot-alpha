schema_version: 1

control_plane_roots:
  - .claude/
  - AGENTS.md

forbidden_roots:
  - src/
  - app/
  - packages/
  - infrastructure/
  - migrations/
  - .github/workflows/
  - .git/
  - secrets/
  - credentials/

owners:
  skills-specialist:
    - .claude/skills/**
    - .claude/control-plane/evals/skills-*.yaml

  rules-specialist:
    - AGENTS.md
    - .claude/AGENTS.md
    - .claude/rules/**
    - .claude/control-plane/evals/rules-*.yaml

  workflow-specialist:
    - .claude/workflows/**
    - .claude/hooks/**
    - .claude/settings.json
    - .claude/agents/**
    - .claude/control-plane/scripts/**
    - .claude/control-plane/schemas/**
    - .claude/control-plane/evals/workflow-*.yaml

verification:
  independent_verifier_required: true
  rollback_on_failure: true
  fresh_session_behavioral_evals: true
  baseline_comparison_required_for_skills: true

budgets:
  max_specialists_per_transaction: 3
  max_concurrent_writers: 1
  max_nested_agent_depth: 0
  max_changed_files_without_explicit_approval: 12
  default_max_turns: 28

experimental_features:
  agent_teams:
    default: disabled
    require_explicit_enablement: true

memory:
  accept_only_verified_runs: true

runs:
  directory: .claude/control-plane/runs
  tracked_in_git: false
  append_only_events: true
  hash_chain_events: true

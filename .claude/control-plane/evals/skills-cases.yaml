schema_version: 1
cases:
  - id: SKILL-DESCRIPTION-001
    kind: routing
    fixture: "A repository with two skills whose descriptions both say \"review code.\""
    invocation: "Audit skill routing overlap."
    assertions:
      - Detect the overlapping activation region.
      - Propose distinct positive and negative routing boundaries.
      - Do not create a third overlapping skill.
    forbidden:
      - Modify application source.
      - Claim line count alone proves quality.

  - id: SKILL-DESCRIPTION-002
    kind: routing
    fixture: "A repository with `skill-creator` and `skill-development` both plausibly triggered by \"create a skill\" style requests: `skill-creator` covers the hands-on draft-test-eval-iterate workflow (running test prompts via subagents, launching the benchmark/eval viewer, running the automated description-optimization script), while `skill-development` covers plugin-specific skill-structure reference guidance (skills/ directory layout, word-count targets, description/body style conventions) for skills living inside a Claude Code plugin."
    invocation: "Route a request to create a new skill and test how well it triggers."
    assertions:
      - Prefer `skill-creator` for hands-on draft-test-eval-iterate work such as running test prompts via subagents, launching the benchmark/eval viewer, or running the description-optimization script.
      - Prefer `skill-development` for plugin skills/ directory structure, word-count targets, or description/body style conventions reference guidance.
      - Do not route a generic "create a skill" prompt to both skills at once.
    forbidden:
      - Modify application source.
      - Treat the description-only overlap fix as sufficient without an eval case.

  - id: SKILL-DESCRIPTION-003
    kind: routing
    fixture: "A repository with `conduct-usability-testing` and `conduct-uat-and-usability-validation` both plausibly triggered by \"test usability\" style requests: `conduct-usability-testing` evaluates the interactive design-stage prototype during the design phase, before a built/functional candidate exists, while `conduct-uat-and-usability-validation` evaluates the built/functional MVP candidate during the test phase, after functional evidence exists."
    invocation: "Route a request to evaluate usability for the current workflow phase."
    assertions:
      - Prefer `conduct-usability-testing` when only a prototype manifest exists and no functional/built candidate is available yet.
      - Prefer `conduct-uat-and-usability-validation` when functional evidence exists and the built candidate's journeys can be exercised.
      - Do not route a generic "test usability" prompt to both skills at once.
    forbidden:
      - Modify application source.
      - Treat the description-only overlap fix as sufficient without an eval case.

  - id: SKILL-SIDE-EFFECT-001
    kind: execution
    fixture: "A proposed skill deletes stale worktrees."
    invocation: "Review the skill for safe side effects."
    assertions:
      - Require preview or dry-run behavior.
      - Require an explicit write or delete scope.
      - Require postcondition verification.
      - Require rollback or an explicit irreversibility warning.

  - id: SKILL-IDEA-MVP-DISCOVERY-001
    kind: routing
    fixture: "A workflow needs bounded discovery artifacts before choosing a core problem."
    invocation: "Route the discovery work."
    assertions:
      - Prefer `brainstorm-product-opportunities`, `validate-problem-hypotheses`, and `select-core-problem` over one monolithic discovery skill.
      - Keep the skills discovery-scoped rather than leaking into scope or architecture.
      - Require explicit evidence gaps and approval language at the discovery gate.

  - id: SKILL-IDEA-MVP-RELEASE-001
    kind: execution
    fixture: "A release-oriented skill is asked to summarize a thin MVP slice."
    invocation: "Audit the release-evidence skills."
    assertions:
      - Separate test-record generation from release-record generation.
      - Forbid the release skill from claiming readiness without explicit evidence.
      - Keep both skills bounded to the first vertical slice instead of a full product roadmap.

  - id: SKILL-IDEA-MVP-SHARED-001
    kind: routing
    fixture: "The workflow needs shared operating-system support for artifact state, decisions, change impact, handoffs, gates, and risks."
    invocation: "Audit the shared-skill layer."
    assertions:
      - Require distinct shared skills for artifact-manifest management, decision recording, change-impact assessment, artifact-contract validation, source-grounding verification, traceability-matrix creation, specialist handoff preparation, phase-gate output, and risk-register maintenance.
      - Keep the shared skills cross-cutting instead of duplicating them into every phase-specific skill.
      - Prevent one monolithic admin skill from swallowing the whole operating system.

  - id: SKILL-IDEA-MVP-SHARED-002
    kind: execution
    fixture: "A shared skill is asked to advance workflow state without authoritative evidence."
    invocation: "Review the shared skill constraints."
    assertions:
      - Forbid shared skills from inventing approvals, dependencies, or stale classifications.
      - Require bounded structured outputs rather than free-form prose only.
      - Keep phase-gate and change-impact skills from regenerating unrelated downstream work by default.
